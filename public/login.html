<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — InvoiceGST</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="bg-grid"></div>

  <!-- Floating particles -->
  <div class="particles">
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
  </div>

  <div class="login-wrapper">
    <div class="login-card">
      <!-- Logo -->
      <div class="login-logo">
        <div class="login-logo-icon">
          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="4" y="6" width="32" height="28" rx="4" stroke="currentColor" stroke-width="2.5"/>
            <path d="M4 14H36" stroke="currentColor" stroke-width="2.5"/>
            <path d="M12 6V14" stroke="currentColor" stroke-width="2.5"/>
            <path d="M28 6V14" stroke="currentColor" stroke-width="2.5"/>
            <path d="M12 22H20" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M12 28H28" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            <circle cx="30" cy="22" r="3" stroke="currentColor" stroke-width="2"/>
          </svg>
        </div>
        <h1 class="login-title">InvoiceGST</h1>
        <p class="login-subtitle">Professional Billing System</p>
      </div>

      <!-- Error message -->
      <div class="login-error" id="loginError" style="display:none;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="loginErrorText">Invalid credentials</span>
      </div>

      <!-- Form -->
      <form class="login-form" id="loginForm">
        <div class="login-field">
          <label for="loginUsername">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Username
          </label>
          <input type="text" id="loginUsername" placeholder="Enter username" autocomplete="username" autofocus required />
        </div>
        <div class="login-field">
          <label for="loginPassword" style="display: flex; align-items: center; justify-content: space-between; width: 100%;">
            <span style="display: flex; align-items: center; gap: 0.4rem;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
              Password
            </span>
            <a href="/forgot-password" style="color: var(--accent-blue); text-decoration: none; font-size: 0.75rem; text-transform: none; letter-spacing: normal; font-weight: 500;">Forgot?</a>
          </label>
          <div class="password-wrapper">
            <input type="password" id="loginPassword" placeholder="Enter password" autocomplete="current-password" required />
            <button type="button" class="password-toggle" id="togglePassword" title="Show password">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <button type="submit" class="login-btn" id="loginBtn">
          <span class="login-btn-text">Sign In</span>
          <div class="login-spinner" id="loginSpinner" style="display:none;"></div>
        </button>
      </form>

      <div class="login-footer">
        <div class="login-hint">
          Don't have an account? &nbsp;<a href="/register" style="color: var(--accent-blue); text-decoration: none; font-weight: 600;">Sign Up</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errorEl = document.getElementById('loginError');
    const errorText = document.getElementById('loginErrorText');
    const btn = document.getElementById('loginBtn');
    const spinner = document.getElementById('loginSpinner');
    const btnText = document.querySelector('.login-btn-text');
    const togglePw = document.getElementById('togglePassword');
    const pwField = document.getElementById('loginPassword');

    // Toggle password visibility
    togglePw.addEventListener('click', () => {
      const isPassword = pwField.type === 'password';
      pwField.type = isPassword ? 'text' : 'password';
      togglePw.innerHTML = isPassword
        ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 01-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
        : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.style.display = 'none';
      btn.disabled = true;
      btnText.textContent = 'Signing in...';
      spinner.style.display = 'block';

      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (res.ok && data.success) {
          btn.classList.add('success');
          btnText.textContent = '✓ Welcome!';
          spinner.style.display = 'none';
          setTimeout(() => { window.location.href = '/'; }, 600);
        } else {
          throw new Error(data.error || 'Login failed');
        }
      } catch (err) {
        errorText.textContent = err.message;
        errorEl.style.display = 'flex';
        btn.disabled = false;
        btnText.textContent = 'Sign In';
        spinner.style.display = 'none';
        // Shake animation
        form.classList.add('shake');
        setTimeout(() => form.classList.remove('shake'), 500);
      }
    });
  </script>
</body>
</html>
