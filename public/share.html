<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>View Invoice — InvoiceGST</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="share.css" />
</head>
<body>
  <!-- ===== GRADIENT BACKDROP ===== -->
  <div class="bg-gradient"></div>
  <div class="bg-grid"></div>

  <div class="share-container">
    <!-- Top toolbar actions -->
    <div class="share-toolbar">
      <div class="share-toolbar-logo">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="4" y="6" width="32" height="28" rx="4" stroke="currentColor" stroke-width="3"/>
          <path d="M4 14H36" stroke="currentColor" stroke-width="3"/>
          <path d="M12 6V14" stroke="currentColor" stroke-width="2.5"/>
          <path d="M28 6V14" stroke="currentColor" stroke-width="2.5"/>
        </svg>
        <span>InvoiceGST</span>
      </div>
      <div class="share-toolbar-actions">
        <button class="btn btn-primary" id="btnDownloadPdf">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download PDF
        </button>
        <button class="btn btn-ghost" id="btnPrint">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6,9 6,2 18,2 18,9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          Print Invoice
        </button>
      </div>
    </div>

    <!-- Error container -->
    <div class="error-card" id="errorCard" style="display:none;">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <h2>Link Expired or Invalid</h2>
      <p id="errorMessage">The invoice you are trying to access could not be found. Please check with the sender.</p>
    </div>

    <!-- Loading spinner -->
    <div class="loading-container" id="loadingContainer">
      <div class="spinner"></div>
      <p>Loading Invoice Details...</p>
    </div>

    <!-- Invoice content wrapper (rendered dynamically) -->
    <div class="invoice-card-wrapper" id="invoiceCardWrapper" style="display:none;">
      <div id="invoicePreview"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <script src="share.js"></script>
</body>
</html>
