<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — InvoiceGST</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="login.css" />
  <link rel="stylesheet" href="register.css" />
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="bg-grid"></div>

  <!-- Floating particles -->
  <div class="particles">
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
  </div>

  <div class="login-wrapper">
    <div class="login-card" id="registerCard">
      <!-- Logo -->
      <div class="login-logo">
        <div class="login-logo-icon">
          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="4" y="6" width="32" height="28" rx="4" stroke="currentColor" stroke-width="2.5"/>
            <path d="M4 14H36" stroke="currentColor" stroke-width="2.5"/>
            <path d="M12 6V14" stroke="currentColor" stroke-width="2.5"/>
            <path d="M28 6V14" stroke="currentColor" stroke-width="2.5"/>
            <path d="M12 22H20" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M12 28H28" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            <circle cx="30" cy="22" r="3" stroke="currentColor" stroke-width="2"/>
          </svg>
        </div>
        <h1 class="login-title">InvoiceGST</h1>
        <p class="login-subtitle">Create a New Account</p>
      </div>

      <!-- Notification message area -->
      <div class="login-error" id="registerError" style="display:none;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="registerErrorText">Registration failed</span>
      </div>

      <div class="register-success-card" id="registerSuccess" style="display:none;">
        <div class="success-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        </div>
        <h3>Registration Submitted!</h3>
        <p id="successMessageText">Please wait for the administrator to activate your account before logging in.</p>
        <a href="/login" class="login-btn" style="text-decoration:none; margin-top: 1rem; width: 100%;">Go to Login</a>
      </div>

      <!-- Form -->
      <form class="login-form" id="registerForm">
        <div class="login-field">
          <label for="registerDisplayName">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
            Full Name
          </label>
          <input type="text" id="registerDisplayName" placeholder="Enter your full name" autofocus required />
        </div>
        
        <div class="login-field">
          <label for="registerEmail">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            Email Address
          </label>
          <input type="email" id="registerEmail" placeholder="Enter email (either Email or Mobile is required)" autocomplete="email" />
        </div>

        <div class="login-field">
          <label for="registerMobile">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            Mobile Number
          </label>
          <input type="tel" id="registerMobile" placeholder="Enter mobile number" autocomplete="tel" />
        </div>
        
        <div class="login-field">
          <label for="registerUsername">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Username
          </label>
          <input type="text" id="registerUsername" placeholder="Choose a username (min 3 chars)" autocomplete="username" required />
        </div>

        <div class="login-field">
          <label for="registerPassword">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            Password
          </label>
          <div class="password-wrapper">
            <input type="password" id="registerPassword" placeholder="Enter password (min 4 chars)" autocomplete="new-password" required />
            <button type="button" class="password-toggle" id="togglePassword" title="Show password">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <div class="login-field">
          <label for="registerConfirmPassword">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            Confirm Password
          </label>
          <input type="password" id="registerConfirmPassword" placeholder="Verify password" autocomplete="new-password" required />
        </div>

        <button type="submit" class="login-btn" id="registerBtn">
          <span class="login-btn-text">Sign Up</span>
          <div class="login-spinner" id="registerSpinner" style="display:none;"></div>
        </button>
      </form>

      <div class="login-footer">
        <div class="login-hint">
          Already have an account? <a href="/login" class="register-link">Sign In</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('registerForm');
    const errorEl = document.getElementById('registerError');
    const errorText = document.getElementById('registerErrorText');
    const successEl = document.getElementById('registerSuccess');
    const successText = document.getElementById('successMessageText');
    const btn = document.getElementById('registerBtn');
    const spinner = document.getElementById('registerSpinner');
    const btnText = document.querySelector('.login-btn-text');
    const togglePw = document.getElementById('togglePassword');
    const pwField = document.getElementById('registerPassword');
    const confirmField = document.getElementById('registerConfirmPassword');

    // Toggle password visibility
    togglePw.addEventListener('click', () => {
      const isPassword = pwField.type === 'password';
      pwField.type = isPassword ? 'text' : 'password';
      confirmField.type = isPassword ? 'text' : 'password';
      togglePw.innerHTML = isPassword
        ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 01-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
        : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.style.display = 'none';

      const displayName = document.getElementById('registerDisplayName').value.trim();
      const email = document.getElementById('registerEmail').value.trim();
      const mobileRaw = document.getElementById('registerMobile').value.trim();
      const username = document.getElementById('registerUsername').value.trim();
      const password = pwField.value;
      const confirmPassword = confirmField.value;

      let mobile = '';
      if (mobileRaw) {
        let normalized = mobileRaw.replace(/\D/g, '');
        if (normalized.length === 12 && normalized.startsWith('91')) {
          normalized = normalized.substring(2);
        } else if (normalized.length === 11 && normalized.startsWith('0')) {
          normalized = normalized.substring(1);
        }
        mobile = normalized;
      }

      if (!displayName) {
        showError('Full Name is required');
        return;
      }

      if (!email && !mobile) {
        showError('Either Email Address or Mobile Number is required');
        return;
      }

      if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showError('Invalid email address format');
        return;
      }

      if (mobile && !/^\d{10}$/.test(mobile)) {
        showError('Mobile number must be a valid 10-digit number (e.g. 9876543210)');
        return;
      }

      if (password !== confirmPassword) {
        showError('Passwords do not match');
        return;
      }

      if (!/^[a-zA-Z0-9_]{3,}$/.test(username)) {
        showError('Username must be alphanumeric and at least 3 characters');
        return;
      }

      if (password.length < 4) {
        showError('Password must be at least 4 characters');
        return;
      }

      btn.disabled = true;
      btnText.textContent = 'Creating account...';
      spinner.style.display = 'block';

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, display_name: displayName, email, mobile }),
        });
        const data = await res.json();
        if (res.ok && data.success) {
          form.style.display = 'none';
          document.querySelector('.login-footer').style.display = 'none';
          document.querySelector('.login-subtitle').style.display = 'none';
          successText.textContent = data.message;
          successEl.style.display = 'block';
        } else {
          throw new Error(data.error || 'Registration failed');
        }
      } catch (err) {
        showError(err.message);
      }
    });

    function showError(msg) {
      errorText.textContent = msg;
      errorEl.style.display = 'flex';
      btn.disabled = false;
      btnText.textContent = 'Sign Up';
      spinner.style.display = 'none';
      form.classList.add('shake');
      setTimeout(() => form.classList.remove('shake'), 500);
    }
  </script>
</body>
</html>
