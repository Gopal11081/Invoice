<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — InvoiceGST</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="bg-grid"></div>

  <div class="particles">
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    <div class="particle"></div><div class="particle"></div><div class="particle"></div>
  </div>

  <div class="login-wrapper">
    <div class="login-card">
      <!-- Logo -->
      <div class="login-logo">
        <div class="login-logo-icon">
          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="4" y="6" width="32" height="28" rx="4" stroke="currentColor" stroke-width="2.5"/>
            <path d="M4 14H36" stroke="currentColor" stroke-width="2.5"/>
            <path d="M12 6V14" stroke="currentColor" stroke-width="2.5"/>
            <path d="M28 6V14" stroke="currentColor" stroke-width="2.5"/>
            <path d="M12 22H20" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M12 28H28" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            <circle cx="30" cy="22" r="3" stroke="currentColor" stroke-width="2"/>
          </svg>
        </div>
        <h1 class="login-title">Forgot Password</h1>
        <p class="login-subtitle">Recover your InvoiceGST Account</p>
      </div>

      <!-- Error message -->
      <div class="login-error" id="resetError" style="display:none;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="resetErrorText">Invalid username or email</span>
      </div>

      <!-- Success message -->
      <div id="resetSuccess" style="display:none; text-align: center; margin-bottom: 1.5rem; animation: errorIn 0.3s ease;">
        <div style="width: 48px; height: 48px; background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.2); border-radius: 50%; color: var(--accent-green); display: flex; align-items: center; justify-content: center; margin: 0 auto 0.75rem;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20,6 9,17 4,12"/></svg>
        </div>
        <h3 style="font-size: 1.1rem; font-weight: 700; color: var(--accent-green); margin-bottom: 0.5rem;">Link Generated</h3>
        <p id="successMsgText" style="font-size: 0.85rem; color: var(--text-secondary); line-height: 1.4;"></p>
        
        <!-- Local Debug Link box -->
        <div id="debugBox" style="display:none; background: rgba(56,189,248,0.06); border: 1px solid rgba(56,189,248,0.15); border-radius: 8px; padding: 1rem; margin-top: 1.5rem; text-align: left;">
          <strong style="color: var(--accent-blue); font-size: 0.8rem; display: block; margin-bottom: 0.25rem;">[Local Debug Link]</strong>
          <span style="font-size: 0.8rem; color: var(--text-secondary);">SMTP is not configured. Click the button below to test the reset form directly:</span>
          <a id="debugResetLink" href="#" style="display: block; margin-top: 0.75rem; padding: 0.5rem; background: rgba(56,189,248,0.12); color: var(--accent-blue); text-decoration: none; border-radius: 4px; font-weight: 600; text-align: center; font-size: 0.8rem; border: 1px solid rgba(56,189,248,0.25);">
            Verify Reset Password Form
          </a>
        </div>
      </div>

      <!-- Form -->
      <form class="login-form" id="forgotForm">
        <div class="login-field">
          <label for="email">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            Email Address
          </label>
          <input type="email" id="email" placeholder="Enter registered email address" autocomplete="email" autofocus required />
        </div>
        <button type="submit" class="login-btn" id="submitBtn" style="margin-top: 0.75rem;">
          <span class="submit-btn-text">Send Reset Link</span>
          <div class="login-spinner" id="submitSpinner" style="display:none;"></div>
        </button>
      </form>

      <div class="login-footer">
        <div class="login-hint">
          Remember your password? &nbsp;<a href="/login" style="color: var(--accent-blue); text-decoration: none; font-weight: 600;">Sign In</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('forgotForm');
    const errorEl = document.getElementById('resetError');
    const errorText = document.getElementById('resetErrorText');
    const successEl = document.getElementById('resetSuccess');
    const successMsg = document.getElementById('successMsgText');
    const debugBox = document.getElementById('debugBox');
    const debugLink = document.getElementById('debugResetLink');
    const btn = document.getElementById('submitBtn');
    const spinner = document.getElementById('submitSpinner');
    const btnText = document.querySelector('.submit-btn-text');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.style.display = 'none';
      btn.disabled = true;
      btnText.textContent = 'Processing...';
      spinner.style.display = 'block';

      const email = document.getElementById('email').value.trim();

      try {
        const res = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        const data = await res.json();
        if (res.ok && data.success) {
          form.style.display = 'none';
          successEl.style.display = 'block';
          successMsg.textContent = data.message;
          
          if (data.debugUrl) {
            debugBox.style.display = 'block';
            debugLink.href = data.debugUrl;
          }
        } else {
          throw new Error(data.error || 'Request failed');
        }
      } catch (err) {
        errorText.textContent = err.message;
        errorEl.style.display = 'flex';
        btn.disabled = false;
        btnText.textContent = 'Send Reset Link';
        spinner.style.display = 'none';
        
        form.classList.add('shake');
        setTimeout(() => form.classList.remove('shake'), 500);
      }
    });
  </script>
</body>
</html>
